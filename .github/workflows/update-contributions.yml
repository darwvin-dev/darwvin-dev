name: Update profile contributions

on:
workflow_dispatch:
schedule:
- cron: "0 */12 * * *"

permissions:
contents: write

jobs:
update-contributions:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Generate contributions section
    env:
      GH_TOKEN: ${{ github.token }}
      USERNAME: darwvin-dev
    run: |
      set -e

      START="<!-- CONTRIBUTIONS:START -->"
      END="<!-- CONTRIBUTIONS:END -->"

      if ! grep -q "$START" README.md; then
        echo "README.md does not contain CONTRIBUTIONS:START marker"
        exit 1
      fi

      if ! grep -q "$END" README.md; then
        echo "README.md does not contain CONTRIBUTIONS:END marker"
        exit 1
      fi

      echo "### SIPp Contributions" > contributions.md
      echo "" >> contributions.md

      gh search prs \
        --repo SIPp/sipp \
        --author "$USERNAME" \
        --limit 5 \
        --json title,url,state \
        --template '{{range .}}- [{{.title}}]({{.url}}) — `{{.state}}`{{"\n"}}{{end}}' \
        >> contributions.md || true

      if [ ! -s contributions.md ] || [ "$(wc -l < contributions.md)" -le 2 ]; then
        echo "- No public SIPp PRs found yet." >> contributions.md
      fi

      echo "" >> contributions.md
      echo "### Recent Open Source PRs" >> contributions.md
      echo "" >> contributions.md

      gh search prs \
        --author "$USERNAME" \
        --limit 5 \
        --json title,url,state,repository \
        --template '{{range .}}- [{{.title}}]({{.url}}) — `{{.state}}`{{"\n"}}{{end}}' \
        >> contributions.md || true

      echo "" >> contributions.md
      echo "<sub>Last updated automatically by GitHub Actions.</sub>" >> contributions.md

      awk -v start="$START" -v end="$END" '
        BEGIN {
          while ((getline line < "contributions.md") > 0) {
            block = block line "\n"
          }
        }
        $0 == start {
          print
          printf "%s", block
          skip = 1
          next
        }
        $0 == end {
          skip = 0
          print
          next
        }
        !skip {
          print
        }
      ' README.md > README.tmp

      mv README.tmp README.md

  - name: Commit changes
    run: |
      if [ -n "$(git status --porcelain)" ]; then
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "Update profile contributions"
        git push
      else
        echo "No changes to commit."
      fi
